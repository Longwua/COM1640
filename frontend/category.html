<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Categories</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">Manage Categories</div>

<div class="container">

    <button class="button" onclick="go('admin.html')" style="background:#6b7280;">⬅ Back</button>

    <div class="card">
        <h2>Category Management</h2>

        <h3>Add New Category</h3>
        <input id="newCategory" class="input" placeholder="Category name">
        <button class="button" onclick="addCategory()">Add Category</button>
    </div>

    <div class="card">
        <h3>Existing Categories</h3>
        <div id="categoryList"></div>
    </div>

</div>

<script>
const API = "http://localhost:3000";

// PAGE GUARD (Admin only)
const role = localStorage.getItem("role");
const email = localStorage.getItem("email");

if (!email) {
    alert("Please login first!");
    window.location.href = "login.html";
}

if (role !== "admin") {
    alert("❌ Access denied: Admin only!");
    window.location.href = "dashboard.html";
}

function go(p){ window.location.href = p; }


// ✅ Load category list
function loadCategories() {
    fetch(API + "/categories")
        .then(res => res.json())
        .then(data => {
            let box = document.getElementById("categoryList");
            box.innerHTML = "";

            data.forEach(cat => {
                box.innerHTML += `
                    <div class="idea">
                        <b>${cat.name}</b>
                        <button class="button" style="background:red; float:right;"
                            onclick="deleteCategory(${cat.id})">Delete</button>
                    </div>
                `;
            });
        });
}

// ✅ Add Category
function addCategory() {
    let name = document.getElementById("newCategory").value.trim();
    if (!name) return alert("Please enter a category name");

    fetch(API + "/categories", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(res => {
        if (res.error) return alert(res.error);
        alert("✅ Category added!");
        loadCategories();
    });
}

// ✅ Delete Category by ID
function deleteCategory(id) {
    fetch(API + "/categories/delete", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ id })
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Category deleted!");
        loadCategories();
    });
}

loadCategories();
</script>

</body>
</html>
